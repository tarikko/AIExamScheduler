<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intelligent University Exam Scheduling System</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1d2;
      --panel: #ffecb3;
      --panel-strong: #ffd966;
      --accent: #ff5e5b;
      --deep: #772953;
      --grid-line: #ddb347;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #ffe27a, #f5d494 50%, #e7c18d 100%);
      color: #2b1f17;
    }

    .page {
      min-height: 100vh;

    function renderSchedule(assignments, meta) {
      const results = document.getElementById('schedule-results');
      results.innerHTML = '';

      const header = document.createElement('div');
      header.innerHTML = `<strong>${meta.label}</strong> • ${meta.time.toFixed(1)}ms • Penalties ${meta.penalty}`;
      results.appendChild(header);

      assignments.forEach(slot => {
        const row = document.createElement('div');
        row.className = 'grid-row';
        row.innerHTML = `
          <div class="grid-cell slot-label">${slot.slot.label}</div>
          <div class="grid-cell">${slot.course.code}</div>
          <div class="grid-cell">${slot.course.name}</div>
          <div class="grid-cell">${slot.room.name} (${slot.room.capacity} seats)</div>
        `;
        results.appendChild(row);
      });

      document.getElementById('score-note').textContent =
        'Soft constrained students-in-a-row: ' + meta.softViolations;
    }

    function buildMasterGrid(assignments) {
      const container = document.getElementById('master-grid');
      container.innerHTML = '';

      const header = document.createElement('div');
      header.className = 'grid-header';
      header.innerHTML = `<div class="grid-cell">Slot ↓ / Room →</div>` +
        dataset.rooms.map(room => `<div class="grid-cell">${room.name}</div>`).join('');
      container.appendChild(header);

      timeSlots.forEach(slot => {
        const row = document.createElement('div');
        row.className = 'grid-row';
        const cells = [
          `<div class="grid-cell slot-label">${slot.label}</div>`,
          ...dataset.rooms.map(room => {
            const match = assignments.find(
              assignment => assignment.slot.id === slot.id && assignment.room.name === room.name
            );
            const text = match ? `${match.course.code} (${match.course.enrollment})` : '—';
            return `<div class="grid-cell">${text}</div>`;
          })
        ];
        row.innerHTML = cells.join('');
        container.appendChild(row);
      });
    }

    function buildHeatmap(assignments) {
      const container = document.getElementById('heatmap');
      container.innerHTML = '';
      const dayStress = {};
      dataset.students.forEach(student => {
        const assignedSlots = assignments
          .filter(assignment => student.courses.includes(assignment.course.code))
          .map(assignment => assignment.slot)
          .sort((a, b) => a.index - b.index);
        assignedSlots.forEach((slot, index) => {
          const next = assignedSlots[index + 1];
          if (next && next.day === slot.day && next.index === slot.index + 1) {
            dayStress[slot.day] = (dayStress[slot.day] || 0) + 1;
          }
        });
      });

      Object.entries(dayStress).forEach(([day, count]) => {
        const cell = document.createElement('div');
        const intensity = Math.min(100, count * 12);
        cell.className = 'heat-cell';
        cell.style.background = `rgba(255, 94, 91, ${Math.min(0.9, intensity / 120)})`;
        cell.innerHTML = `${day}<div class="heat-bar" style="opacity:${Math.min(1, intensity / 120)}"></div><small>${count} conflicts</small>`;
        container.appendChild(cell);
      });
      if (!Object.keys(dayStress).length) {
        container.innerHTML = '<p>No consecutive exam conflicts detected.</p>';
      }
    }

    function assessPenalties(assignments) {
      let hardViolations = 0;
      let softViolations = 0;
      const seen = new Set();
      assignments.forEach(assignment => {
        const key = `${assignment.slot.id}-${assignment.room.name}`;
        if (seen.has(key)) hardViolations++;
        seen.add(key);
      });
      dataset.students.forEach(student => {
        const slots = assignments
          .filter(assignment => student.courses.includes(assignment.course.code))
          .map(assignment => assignment.slot.index)
          .sort((a, b) => a - b);
        for (let i = 0; i < slots.length - 1; i++) {
          if (slots[i + 1] - slots[i] === 1) softViolations++;
        }
      });
      return hardViolations * 50 + softViolations * 3;
    }

    function updateComparison(key, meta) {
      if (!bestCompare[key] || bestCompare[key].penalty > meta.penalty) {
        bestCompare[key] = meta;
      }
    }

    async function init() {
      dataset = await fetch('data/fake-data.json').then(res => res.json());
      renderDataOverview(dataset);

      const controlBar = document.getElementById('strategy-controls');
      Object.entries(algorithms).forEach(([key, config], index) => {
        const button = document.createElement('button');
        button.className = 'algo-btn';
        button.textContent = config.label;
        button.addEventListener('click', () => runStrategy(key));
        if (index === 0) button.classList.add('active');
        controlBar.appendChild(button);
      });

      runStrategy('greedy');
    }

    function runStrategy(key) {
      dataset &&
        Array.from(document.querySelectorAll('.algo-btn')).forEach(btn => btn.classList.remove('active'));
      const button = Array.from(document.querySelectorAll('.algo-btn')).find(btn => btn.textContent === algorithms[key].label);
      button?.classList.add('active');

      const start = performance.now();
      const result = algorithms[key].fn(dataset);
      const end = performance.now();
      const penalty = assessPenalties(result);
      const softViolations = penalty / 3;

      document.getElementById('algo-note').textContent = algorithms[key].note;

      renderSchedule(result, {
        label: algorithms[key].label,
        time: end - start,
        penalty,
        softViolations
      });

      buildMasterGrid(result);
      buildHeatmap(result);
      updateComparison(key, { label: algorithms[key].label, penalty, time: end - start });
    }

    init();
  </script>
</body>
</html>
